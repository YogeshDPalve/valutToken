version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - vaulttoken_redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - PORT=3000
    depends_on:
      - redis
    # Pass through environment variables from the host or an env file
    env_file:
      - .env

volumes:
  vaulttoken_redis_data:
